version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: dropx_postgres
    environment:
      POSTGRES_USER: dropx_user
      POSTGRES_PASSWORD: dropx_password
      POSTGRES_DB: dropx_db
    ports:
      - "5433:5432"
    volumes:
      - dropx_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  dropx_pgdata:
